name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: labo05-paiement
    steps:
      - name: Nettoyer workspace
        run: |
          sudo rm -rf ${{ github.workspace }}/* || true
          sudo rm -rf ${{ github.workspace }}/.pytest_cache || true

      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Créer fichier .env
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

      - name: Démarrer le conteneur
        run: |
          docker network create labo05-network || true
          sudo docker compose down -v || true
          docker compose up -d --build

      - name: Attendre MySQL
        run: |
          sleep 10
          timeout=60
          until docker compose exec -T mysql mysqladmin ping -h localhost -u root -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 3
            timeout=$((timeout - 3))
            if [ $timeout -le 0 ]; then
              echo "MySQL failed to start"
              exit 1
            fi
          done
          sleep 5

      - name: Éxécuter les tests
        run: docker compose exec -T payments pytest

      - name: Cleanup
        if: always()
        run: docker compose down -v
